<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bài 2</title>

<style>
body { font-family: Arial; padding: 20px; }

form {
  max-width: 400px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>

</head>

<body>

<h2>Đăng ký</h2>

<form id="form">
  <input type="text" id="name" placeholder="Tên">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Mật khẩu">
  <label><input type="checkbox" id="agree"> Đồng ý điều khoản</label>
  <button type="submit">Đăng ký</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value;
  const agree = document.getElementById("agree").checked;

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

  if(!emailRegex.test(email)){
    return alert("Email không hợp lệ");
  }

  if(!passRegex.test(pass)){
    return alert("Mật khẩu yếu");
  }

  if(!agree){
    return alert("Phải đồng ý điều khoản");
  }

  const user = {name, email};
  localStorage.setItem("user", JSON.stringify(user));

  document.getElementById("msg").innerText = "Đăng ký thành công!";
});
</script>

</body>
</html>
