<div class="container">

<h1>Liên hệ</h1>

<p><b>Sinh viên:</b> Nhan Ngọc Ngôn</p>
<p><b>MSSV:</b> 231A290136</p>
<p><b>Email:</b> nhanngon.it@gmail.com</p>

<form id="contactForm">
  <input type="text" id="name" placeholder="Tên của bạn">
  <input type="email" id="email" placeholder="Email">
  <textarea id="message" placeholder="Nội dung"></textarea>
  <button type="submit">Gửi</button>
</form>

<p id="msg"></p>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message").value.trim();

  if(name === "" || email === "" || message === ""){
    return alert("Vui lòng nhập đầy đủ thông tin!");
  }

  document.getElementById("msg").innerText = "Gửi thành công!";
});
</script>
